<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>LyricFlow</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=DM+Mono:wght@300;400&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#08080c;--s:#101016;--a:#f0a030;--at:rgba(240,160,48,.1);--ag:rgba(240,160,48,.35);--t:#e8e4dc;--t2:rgba(232,228,220,.55);--t3:rgba(232,228,220,.2);--t4:rgba(232,228,220,.08);--b:rgba(255,255,255,.06);--r:12px;--rs:8px;--fd:'Cormorant Garamond',serif;--fb:'Noto Sans SC',sans-serif;--fm:'DM Mono',monospace}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--t);font-family:var(--fb);-webkit-font-smoothing:antialiased}
#bg{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.orb{position:absolute;border-radius:50%;filter:blur(120px);will-change:transform}
.o1{width:60vmax;height:60vmax;background:radial-gradient(circle,#1a103a,transparent 70%);top:-20%;left:-10%;animation:d1 25s ease-in-out infinite alternate}
.o2{width:50vmax;height:50vmax;background:radial-gradient(circle,#0f1a2a,transparent 70%);bottom:-15%;right:-10%;animation:d2 30s ease-in-out infinite alternate}
.o3{width:35vmax;height:35vmax;background:radial-gradient(circle,#2a1a0f,transparent 70%);top:40%;left:50%;animation:d3 20s ease-in-out infinite alternate}
@keyframes d1{to{transform:translate(10%,5%) scale(1.1)}}
@keyframes d2{to{transform:translate(-8%,-6%) scale(1.15)}}
@keyframes d3{to{transform:translate(-40%,-55%) scale(1.1)}}
#app{position:relative;z-index:1;display:flex;flex-direction:column;height:100vh}
#topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 28px;flex-shrink:0;backdrop-filter:blur(20px);background:rgba(8,8,12,.5);border-bottom:1px solid var(--b)}
.meta h1{font-family:var(--fd);font-size:1.25rem;font-weight:400}
.meta p{font-family:var(--fm);font-size:.7rem;color:var(--t2);margin-top:2px}
.dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:6px;vertical-align:middle;background:#e55;transition:background .3s}
.dot.on{background:#5c5}
.actions{display:flex;gap:6px;flex-wrap:wrap}
.actions button{background:0;border:1px solid var(--b);color:var(--t2);padding:7px 14px;border-radius:var(--rs);font-family:var(--fm);font-size:.68rem;cursor:pointer;transition:all .2s;white-space:nowrap}
.actions button:hover{background:var(--at);border-color:var(--a);color:var(--a)}
#viewport{flex:1;position:relative;overflow:hidden}
#scroller{position:absolute;inset:0;overflow-y:auto;scrollbar-width:none}
#scroller::-webkit-scrollbar{display:none}
.spacer{height:42vh;pointer-events:none}
.ll{padding:10px 48px;font-size:1.3rem;font-weight:400;line-height:1.7;text-align:center;color:var(--t);cursor:pointer;position:relative;max-width:860px;margin:0 auto;transition:opacity .5s,transform .5s cubic-bezier(.22,1,.36,1),color .4s,font-size .4s cubic-bezier(.22,1,.36,1),text-shadow .4s,font-weight .3s}
.ll:hover{background:rgba(255,255,255,.015)}
.ll.on{font-size:1.75rem;font-weight:500;color:var(--a);text-shadow:0 0 50px var(--ag),0 0 100px rgba(240,160,48,.12)}
.ll .ts{position:absolute;left:16px;top:50%;transform:translateY(-50%);font-family:var(--fm);font-size:.6rem;color:var(--t4);opacity:0;transition:opacity .2s;pointer-events:none}
.ll:hover .ts{opacity:1}
#empty{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;text-align:center;transition:opacity .5s}
#empty.hide{opacity:0;pointer-events:none}
#empty .ico{font-family:var(--fd);font-style:italic;font-size:60px;color:var(--a);opacity:.45}
#empty h2{font-family:var(--fd);font-size:1.5rem;font-weight:300}
#empty p{font-size:.82rem;color:var(--t3)}
.ebtns{display:flex;gap:8px;margin-top:6px;flex-wrap:wrap;justify-content:center}
.ebtns button{background:0;border:1px solid var(--b);color:var(--t2);padding:10px 20px;border-radius:var(--rs);font-family:var(--fm);font-size:.72rem;cursor:pointer;transition:all .2s}
.ebtns button:hover{border-color:var(--a);color:var(--a)}
.ebtns .pri{background:var(--a);color:var(--bg);border-color:var(--a)}
.ebtns .pri:hover{filter:brightness(1.15)}
#controls{flex-shrink:0;backdrop-filter:blur(24px);background:rgba(8,8,12,.6);border-top:1px solid var(--b);padding:0 28px 14px}
#prog{padding:10px 0 6px}
#ptrack{height:3px;background:rgba(255,255,255,.08);border-radius:2px}
#pfill{height:100%;background:var(--a);border-radius:2px;width:0%;transition:width .12s linear}
.crow{display:flex;align-items:center;gap:20px;margin-top:4px}
.ctime{font-family:var(--fm);font-size:.68rem;color:var(--t3);min-width:38px}
.ctime.r{text-align:right}
.cbtns{display:flex;align-items:center;gap:6px}
.cbtns button{background:0;border:none;color:var(--t2);cursor:pointer;padding:6px;border-radius:50%;transition:all .2s;font-size:.9rem;width:36px;height:36px;display:flex;align-items:center;justify-content:center}
.cbtns button:hover{transform:scale(1.12)}
#bplay{background:var(--a)!important;color:var(--bg)!important;width:42px!important;height:42px!important;font-size:1rem!important}
.coff{margin-left:auto;display:flex;align-items:center;gap:6px}
.coff button{background:0;border:1px solid var(--b);color:var(--t2);padding:3px 10px;border-radius:4px;font-family:var(--fm);font-size:.62rem;cursor:pointer;transition:all .2s}
.coff button:hover{border-color:var(--a);color:var(--a)}
.coff span{font-family:var(--fm);font-size:.68rem;color:var(--t3);min-width:76px;text-align:center}
.modal{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.55);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s}
.modal.open{opacity:1;pointer-events:auto}
.mbox{background:var(--s);border:1px solid var(--b);border-radius:var(--r);padding:28px 32px;width:min(560px,92vw);max-height:82vh;overflow-y:auto;transform:translateY(16px) scale(.98);transition:transform .35s cubic-bezier(.22,1,.36,1);position:relative}
.modal.open .mbox{transform:translateY(0) scale(1)}
.mbox h2{font-family:var(--fd);font-size:1.35rem;font-weight:400;margin-bottom:18px}
.mbox input[type=text],.mbox textarea{width:100%;background:rgba(255,255,255,.03);border:1px solid var(--b);border-radius:var(--rs);padding:11px 14px;color:var(--t);font-family:var(--fb);font-size:.88rem;outline:0;transition:border-color .2s}
.mbox input:focus,.mbox textarea:focus{border-color:var(--a)}
.mbox textarea{height:180px;resize:vertical;font-size:.8rem;line-height:1.6}
.srow{display:flex;gap:8px;margin-bottom:14px}
.srow input{flex:1}
.mbtn{background:var(--a);color:var(--bg);border:none;padding:9px 20px;border-radius:var(--rs);font-family:var(--fm);font-size:.75rem;font-weight:500;cursor:pointer;transition:all .2s;white-space:nowrap}
.mbtn:hover{filter:brightness(1.12)}
.mbtn.blk{width:100%;margin-top:12px;padding:12px}
.mclose{position:absolute;top:14px;right:18px;background:0;border:none;color:var(--t3);font-size:1.4rem;cursor:pointer;transition:color .2s;line-height:1}
.mclose:hover{color:var(--t)}
.sr{padding:13px 14px;border:1px solid var(--b);border-radius:var(--rs);margin-bottom:8px;cursor:pointer;transition:all .2s}
.sr:hover{border-color:var(--a);background:var(--at)}
.sr h4{font-size:.92rem;font-weight:500}
.sr p{font-size:.76rem;color:var(--t2);margin-top:3px}
.sr .tag{display:inline-block;font-family:var(--fm);font-size:.58rem;padding:2px 7px;border-radius:3px;margin-top:5px;background:var(--at);color:var(--a)}
.sr .tag.no{background:rgba(255,255,255,.04);color:var(--t3)}
.srinfo{font-family:var(--fm);font-size:.72rem;color:var(--t3);padding:20px;text-align:center}
.msg{font-family:var(--fm);font-size:.8rem;color:var(--t3);text-align:center;padding:24px}
.spin{display:inline-block;width:16px;height:16px;border:2px solid var(--b);border-top-color:var(--a);border-radius:50%;animation:sp .7s linear infinite;margin-right:8px;vertical-align:middle}
@keyframes sp{to{transform:rotate(360deg)}}
#logbtn{position:fixed;bottom:80px;right:18px;z-index:50;background:var(--s);border:1px solid var(--b);color:var(--t3);padding:5px 10px;border-radius:var(--rs);font-family:var(--fm);font-size:.6rem;cursor:pointer;transition:all .2s}
#logbtn:hover{border-color:var(--a);color:var(--a)}
#logpanel{position:fixed;bottom:80px;right:18px;width:min(480px,80vw);max-height:260px;z-index:60;background:rgba(8,8,12,.92);border:1px solid var(--b);border-radius:var(--r);display:none;flex-direction:column;backdrop-filter:blur(16px)}
#logpanel.open{display:flex}
#loghead{display:flex;justify-content:space-between;align-items:center;padding:8px 14px;border-bottom:1px solid var(--b)}
#loghead h3{font-family:var(--fm);font-size:.7rem;font-weight:400;color:var(--t2)}
#loghead button{background:0;border:none;color:var(--t3);cursor:pointer;font-size:1rem}
#logbody{flex:1;overflow-y:auto;padding:8px 14px;font-family:var(--fm);font-size:.62rem;line-height:1.7;color:var(--t2);scrollbar-width:none}
#logbody::-webkit-scrollbar{display:none}
@media(max-width:640px){#topbar{padding:10px 16px}.meta h1{font-size:1rem}.actions button{padding:6px 10px;font-size:.6rem}.ll{padding:8px 24px;font-size:1.1rem}.ll.on{font-size:1.4rem}#controls{padding:0 16px 10px}.crow{flex-wrap:wrap;gap:8px}.coff{margin-left:0}#logpanel{width:90vw;right:5vw}}
</style>
</head>
<body>
<div id="bg"><div class="orb o1"></div><div class="orb o2"></div><div class="orb o3"></div></div>
<div id="app">
<header id="topbar">
<div class="meta">
<h1><span class="dot" id="dot"></span><span id="t-title">LyricFlow</span></h1>
<p id="t-artist">连接中...</p>
</div>
<div class="actions">
<button onclick="toggleFs()">全屏</button>
<button onclick="openModal('search')">搜索歌词</button>
<button onclick="openModal('paste')">粘贴歌词</button>
<button onclick="document.getElementById('flrc').click()">上传 .lrc</button>
</div>
</header>
<section id="viewport">
<div id="scroller"><div class="spacer"></div><div id="body"></div><div class="spacer"></div></div>
<div id="empty">
<div class="ico">&#9835;</div>
<h2>等待播放器播放歌曲</h2>
<p>支持网易云音乐 / QQ音乐 / Spotify / foobar2000 等</p>
<p style="font-size:.72rem;color:var(--t4);margin-top:6px">歌词自动从 LRCLIB + 网易云音乐获取</p>
<p style="font-size:.72rem;color:var(--t4)">点击歌词行可快速同步位置</p>
<div class="ebtns">
<button class="pri" onclick="openModal('search')">搜索歌词</button>
<button onclick="openModal('paste')">粘贴歌词</button>
<button onclick="document.getElementById('flrc').click()">上传 .lrc</button>
</div>
</div>
</section>
<footer id="controls">
<div id="prog"><div id="ptrack"><div id="pfill"></div></div></div>
<div class="crow">
<span class="ctime" id="tc">0:00</span>
<div class="cbtns">
<button onclick="sendKey('prev')" title="上一曲">&#9198;</button>
<button id="bplay" onclick="sendKey('toggle')" title="播放/暂停">&#9654;</button>
<button onclick="sendKey('next')" title="下一曲">&#9197;</button>
</div>
<span class="ctime r" id="td">0:00</span>
<div class="coff">
<button onclick="offAdd(-5)">&#8722;5s</button>
<button onclick="offAdd(-0.5)">&#8722;0.5</button>
<span id="oval">偏移: 0.0s</span>
<button onclick="offAdd(0.5)">+0.5</button>
<button onclick="offAdd(5)">+5s</button>
</div>
</div>
</footer>
</div>
<div class="modal" id="m-search"><div class="mbox">
<button class="mclose" onclick="closeModal('search')">&times;</button>
<h2>搜索歌词</h2>
<p style="font-size:.75rem;color:var(--t3);margin-bottom:14px">从 LRCLIB + 网易云音乐搜索同步歌词</p>
<div class="srow"><input type="text" id="s-track" placeholder="歌曲名称"><input type="text" id="s-artist" placeholder="艺术家（可选）"><button class="mbtn" onclick="doSearch()">搜索</button></div>
<div id="s-res"></div>
</div></div>
<div class="modal" id="m-paste"><div class="mbox">
<button class="mclose" onclick="closeModal('paste')">&times;</button>
<h2>粘贴歌词</h2>
<p style="font-size:.75rem;color:var(--t3);margin-bottom:14px">粘贴 LRC 格式的同步歌词</p>
<textarea id="p-txt" placeholder="[00:12.00]第一行歌词&#10;[00:17.50]第二行歌词"></textarea>
<button class="mbtn blk" onclick="doPaste()">应用歌词</button>
</div></div>
<input type="file" id="flrc" hidden accept=".lrc,.txt">
<button id="logbtn" onclick="toggleLog()">Log</button>
<div id="logpanel"><div id="loghead"><h3>Debug Log</h3><button onclick="toggleLog()">&times;</button></div><div id="logbody"></div></div>
<script>
function toggleFs(){
if(!document.fullscreenElement){document.documentElement.requestFullscreen().catch(function(){})}
else{document.exitFullscreen()}
}
var S={lyrics:[],idx:-1,offset:0,userScroll:false,autoScrolling:false,scrollY:0,position:0,duration:0,estDur:0,isPlaying:false};
var ws=null;
function el(id){return document.getElementById(id)}
function fmt(s){if(!isFinite(s)||s<0)s=0;var m=Math.floor(s/60),sc=Math.floor(s%60);return m+':'+(sc<10?'0':'')+sc}
function esc(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML}
function wsSend(t,d){if(ws&&ws.readyState===1)ws.send(JSON.stringify({type:t,data:d}))}
function sendKey(k){wsSend('key',k)}
var logOpen=false;
function toggleLog(){logOpen=!logOpen;el('logpanel').classList.toggle('open',logOpen)}
function addLog(m){var b=el('logbody');b.innerHTML+=m+'\n';b.scrollTop=b.scrollHeight}
function connect(){
ws=new WebSocket('ws://'+location.host);
ws.onopen=function(){el('t-artist').textContent='已连接';addLog('已连接')};
ws.onclose=function(){el('t-artist').textContent='断开，重连中...';setTimeout(connect,3000)};
ws.onmessage=function(ev){try{handleMsg(JSON.parse(ev.data))}catch(e){}}
}
function handleMsg(msg){
var d=msg.data;
if(msg.type==='init'){
el('dot').className=d.connected?'dot on':'dot';
if(d.title){el('t-title').textContent=d.title;el('t-artist').textContent=d.artist||''}
S.position=d.position||0;S.duration=d.duration||0;S.estDur=d.duration||0;
if(d.lyrics)renderLyrics(d.lyrics,d.lyricsSource);updateTime();
}else if(msg.type==='status'){el('dot').className=d.connected?'dot on':'dot'}
else if(msg.type==='track'){el('t-title').textContent=d.title||'';el('t-artist').textContent=d.artist||''}
else if(msg.type==='position'){S.position=d.position||0;S.isPlaying=d.isPlaying;S.estDur=d.duration||S.estDur;updateTime();el('bplay').innerHTML=d.isPlaying?'&#10074;&#10074;':'&#9654;'}
else if(msg.type==='lyrics'){if(d.lyrics)renderLyrics(d.lyrics,d.source);else if(d.source==='loading')el('body').innerHTML='<div class="msg"><span class="spin"></span>正在获取歌词...</div>';else el('body').innerHTML='<div class="msg">未找到歌词，请手动搜索或粘贴</div>'}
else if(msg.type==='searchResults')showResults(d)
else if(msg.type==='log')addLog(d.message)
else if(msg.type==='logs'&&Array.isArray(d))d.forEach(function(m){addLog(m)})
}
function renderLyrics(lyrics,source){
S.lyrics=lyrics;S.idx=-1;
if(lyrics.length>0)S.estDur=lyrics[lyrics.length-1].time+15;
var body=el('body');body.innerHTML='';
if(!lyrics||!lyrics.length){body.innerHTML='<div class="msg">无歌词</div>';el('empty').classList.add('hide');return}
addLog('歌词: '+lyrics.length+' 行 ('+source+')');
for(var i=0;i<lyrics.length;i++){
var div=document.createElement('div');div.className='ll';
div.innerHTML='<span class="ts">'+fmt(lyrics[i].time)+'</span><span>'+esc(lyrics[i].text)+'</span>';
(function(time){div.addEventListener('click',function(){
S.offset=time-S.position;
el('oval').textContent='偏移: '+S.offset.toFixed(1)+'s';
addLog('同步: '+fmt(time)+' off='+S.offset.toFixed(1)+'s');
})})(lyrics[i].time);
body.appendChild(div);
}
el('empty').classList.add('hide');
}
function updateActive(){
var t=S.position+S.offset,idx=-1;
for(var i=S.lyrics.length-1;i>=0;i--){if(S.lyrics[i].time<=t){idx=i;break}}
if(idx===-1&&S.lyrics.length>0)idx=0;
if(idx!==S.idx){
S.idx=idx;
var lines=el('body').children;
for(var i=0;i<lines.length;i++){
var dist=Math.abs(i-idx),active=i===idx;
if(active){lines[i].classList.add('on');lines[i].style.opacity='1';lines[i].style.transform='scale(1)'}
else{lines[i].classList.remove('on');lines[i].style.opacity=Math.max(.07,1-dist*.22);lines[i].style.transform='scale('+Math.max(.95,1-dist*.008)+')'}
}
if(!S.userScroll){
var act=el('body').querySelector('.ll.on');
if(act){
S.autoScrolling=true;
act.scrollIntoView({behavior:'smooth',block:'center'});
setTimeout(function(){S.autoScrolling=false},600);
var scrollTimer;
el('scroller').addEventListener('scroll',function(){if(S.autoScrolling)return;S.userScroll=true;clearTimeout(scrollTimer);scrollTimer=setTimeout(function(){S.userScroll=false},3500)},{passive:true});
}
}
}
}
function updateTime(){el('tc').textContent=fmt(S.position);el('td').textContent=fmt(S.estDur);if(S.estDur>0)el('pfill').style.width=Math.min(100,S.position/S.estDur*100)+'%'}
function offAdd(v){S.offset+=v;el('oval').textContent='偏移: '+S.offset.toFixed(1)+'s'}
function openModal(n){el('m-'+n).classList.add('open');if(n==='search')setTimeout(function(){el('s-track').focus()},200)}
function closeModal(n){el('m-'+n).classList.remove('open')}
document.querySelectorAll('.modal').forEach(function(m){m.addEventListener('click',function(e){if(e.target===m)m.classList.remove('open')})});
function doSearch(){var t=el('s-track').value.trim(),a=el('s-artist').value.trim();if(!t){el('s-track').focus();return}el('s-res').innerHTML='<div class="msg"><span class="spin"></span>搜索中...</div>';wsSend('search',{track:t,artist:a})}
function showResults(results){
var box=el('s-res');box.innerHTML='';
if(!results||!results.length){box.innerHTML='<div class="srinfo">未找到结果</div>';return}
results.forEach(function(r){
var div=document.createElement('div');div.className='sr';
div.innerHTML='<h4>'+esc(r.trackName)+'</h4><p>'+esc(r.artistName)+(r.albumName?' &middot; '+esc(r.albumName):'')+(r.duration?' &middot; '+fmt(r.duration):'')+'</p>'+(r.hasSynced?'<span class="tag">同步歌词</span>':'<span class="tag no">仅文本</span>');
div.addEventListener('click',function(){var l=r.syncedLyrics||r.plainLyrics;if(l){wsSend('applyLyrics',l);closeModal('search')}});
box.appendChild(div);
});
}
function doPaste(){var t=el('p-txt').value.trim();if(!t)return;wsSend('applyLyrics',t);closeModal('paste')}
el('flrc').addEventListener('change',function(e){var f=e.target.files[0];if(!f)return;var r=new FileReader();r.onload=function(ev){wsSend('lrc',ev.target.result)};r.readAsText(f);e.target.value=''});
document.addEventListener('keydown',function(e){
if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA'){if(e.key==='Enter'&&el('m-search').classList.contains('open'))doSearch();if(e.key==='Escape')document.querySelectorAll('.modal.open').forEach(function(m){m.classList.remove('open')});return}
if(e.key===' '){e.preventDefault();sendKey('toggle')}else if(e.key==='ArrowLeft'){e.preventDefault();offAdd(-5)}else if(e.key==='ArrowRight'){e.preventDefault();offAdd(5)}else if(e.key==='ArrowUp'){e.preventDefault();offAdd(0.5)}else if(e.key==='ArrowDown'){e.preventDefault();offAdd(-0.5)}else if(e.key==='Escape')document.querySelectorAll('.modal.open').forEach(function(m){m.classList.remove('open')});
});
function tick(){updateActive();requestAnimationFrame(tick)}
connect();requestAnimationFrame(tick);
</script>
</body>
</html>
